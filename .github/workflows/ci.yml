name: "Integration Build"

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**.md"
  push:
    branches: [main]
    tags: [v*]
    paths-ignore:
      - "**.md"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  JDK_RELEASE: 21
  JDK_CURRENT: 25
  NODE_LTS: 22
  SBT_OPTS: >-
    -Xmx10G
    -Xms6G
    -Xss4M
    -XX:ReservedCodeCacheSize=512M

jobs:
  test_jvm:
    name: "[JVM: JDK ${{ matrix.java }}] Tests"
    strategy:
      fail-fast: false
      matrix:
        java: [25]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java ${{ matrix.java }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ matrix.java }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Tests
        run: ./project/scripts/run-sbt.sh "kufuli-jvm/test"

      - name: Package
        run: ./project/scripts/run-sbt.sh "kufuli-jvm/package"

  test_js:
    name: "[JS: Node.js ${{ matrix.node }}] Tests"
    strategy:
      fail-fast: false
      matrix:
        node: [24.x]
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          check-latest: true

      - name: Setup Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Tests
        run: ./project/scripts/run-sbt.sh "kufuli-js/test"

      - name: Package
        run: ./project/scripts/run-sbt.sh "kufuli-js/package"

  test_native_linux:
    name: "[Native: ${{ matrix.target }}] Tests"
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-glibc-x86_64
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/el10-jdk:25
            link: dynamic
          - target: linux-glibc-aarch64
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/el10-jdk:25
            link: dynamic
          # scala-native's musl stack-guard handling (upstream #4934, unreleased as of 0.5.12)
          # SIGSEGVs static binaries at the first new-thread creation (backtrace in
          # SCALA_NATIVE_ISSUES.md §3); dynamic musl passes. Best-effort until the fix ships.
          - target: linux-musl-x86_64
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/alpine-jdk:25
            link: dynamic
            continueOnError: true
          - target: linux-musl-aarch64
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/alpine-jdk:25
            link: dynamic
            continueOnError: true
          - target: linux-musl-x86_64-static
            runner: ubuntu-24.04
            dockerImage: shuwariafrica/alpine-jdk:25
            link: static
            continueOnError: true
          - target: linux-musl-aarch64-static
            runner: ubuntu-24.04-arm
            dockerImage: shuwariafrica/alpine-jdk:25
            link: static
            continueOnError: true
    runs-on: ${{ matrix.runner }}
    continue-on-error: ${{ matrix.continueOnError == true }}
    timeout-minutes: 45
    env:
      DOCKER_IMAGE: ${{ matrix.dockerImage }}
      KUFULI_STATIC_LINK: ${{ matrix.link == 'static' && 'true' || 'false' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Tests
        id: tests
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/test"

      - name: Package
        if: matrix.link == 'dynamic'
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/package"

      - name: Verify static linkage
        # The link-time artefact is produced regardless of runtime behaviour, so this assertion
        # runs even when Tests has failed (musl static SIGSEGV pending SN PR #4934). The static
        # link contract is independent of test execution success.
        if: always() && matrix.link == 'static' && steps.tests.conclusion != 'skipped'
        shell: bash
        # Inside the alpine image so `file` and `ldd` are the musl variants and report correctly
        # against musl binaries. `file` is not pre-installed in shuwariafrica/alpine-jdk so add it
        # for the duration of the assertion.
        run: |
          docker run --rm -v "$PWD:$PWD" -w "$PWD" "$DOCKER_IMAGE" sh -c '
            set -e
            apk add --no-cache file >/dev/null
            # sbt 2.x + sbt-snx emit the native binary under target/out; the newest scala-version
            # target is the just-built one, deterministic in CI because each runner is fresh.
            bin=$(find target/out -type f -name 'kufuli-tests-test' 2>/dev/null | sort -V | tail -1)
            if [ -z "$bin" ]; then
              echo "::error::no Native test binary located for static-linkage assertion"
              exit 1
            fi
            echo "--- $bin"
            file_out=$(file "$bin")
            ldd_out=$(ldd "$bin" 2>&1 || true)
            echo "$file_out"
            echo "ldd: $ldd_out"
            case "$file_out" in
              *"statically linked"*) echo "OK: statically linked" ;;
              *) echo "::error::$bin is NOT statically linked: $file_out"; exit 1 ;;
            esac
          '

  test_native_macos:
    name: "[Native: macOS aarch64] Tests"
    runs-on: macos-26
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Tests
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/test"

      - name: Package
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/package"

  test_native_windows:
    name: "[Native: Windows ${{ matrix.arch }}] Tests"
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: windows-2025
            vcvarsArch: amd64
          - arch: aarch64
            runner: windows-11-arm
            vcvarsArch: arm64
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          # Adoptium Temurin does not publish Windows aarch64 JDK 25 (latest is 21);
          # Microsoft Build of OpenJDK ships both x64 and aarch64 win JDK 25.
          distribution: microsoft
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Setup MSVC clang (vcvarsall ${{ matrix.vcvarsArch }})
        shell: pwsh
        run: |
          $vs = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" `
                  -latest -property installationPath
          cmd /c "`"$vs\VC\Auxiliary\Build\vcvarsall.bat`" ${{ matrix.vcvarsArch }} && set" |
            ForEach-Object { if ($_ -match '^([^=]+)=(.*)$') { "$($Matches[1])=$($Matches[2])" } } |
            Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Tests
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/test"

      - name: Package
        shell: bash
        run: ./project/scripts/run-sbt.sh "kufuli-native/package"

  static_analysis:
    name: Static Analysis
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Verify Source Formatting
        id: scalafmt
        continue-on-error: true
        run: sbt --server "scalafmtCheckAll; scalafmtSbtCheck"

      - name: Verify Linting Conformity
        id: scalafix
        continue-on-error: true
        run: sbt --server "scalafixAll --check"

      - name: Verify File Header Conformity
        id: headers
        continue-on-error: true
        run: sbt --server headerCheckAll

      - name: Check for failures
        if: always()
        run: |
          failed=""
          [[ "${{ steps.scalafmt.outcome }}" == "failure" ]] && failed="$failed scalafmtCheckAll"
          [[ "${{ steps.scalafix.outcome }}" == "failure" ]] && failed="$failed scalafixAll"
          [[ "${{ steps.headers.outcome }}" == "failure" ]] && failed="$failed headerCheckAll"
          if [[ -n "$failed" ]]; then
            echo "::error::Static analysis checks failed:$failed"
            exit 1
          fi

  publish:
    name: Publish Binaries
    needs:
      - test_jvm
      - test_js
      - test_native_linux
      - test_native_macos
      - test_native_windows
      - static_analysis
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-24.04
    container: shuwariafrica/el10-jdk:25
    timeout-minutes: 90
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Import Signing Key
        uses: crazy-max/ghaction-import-gpg@v7
        with:
          gpg_private_key: ${{ secrets.SIGNING_KEY }}
          git_user_signingkey: true
          git_commit_gpgsign: true
          trust_level: 5

      - name: Set up Coursier cache
        uses: coursier/cache-action@v8

      - name: Publish Binaries
        run: sbt --server publishSigned
        env:
          SONATYPE_USERNAME: ${{ secrets.PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.PUBLISH_USER_PASSPHRASE }}

      - name: Publish Maven Central Release
        if: startsWith(github.ref, 'refs/tags/v')
        run: sbt --server "sonaUpload; sonaRelease"
        env:
          SONATYPE_USERNAME: ${{ secrets.PUBLISH_USER }}
          SONATYPE_PASSWORD: ${{ secrets.PUBLISH_USER_PASSPHRASE }}

  release:
    name: Create GitHub Release
    needs: [publish]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          prerelease_flag=""
          if [[ "${{ github.ref_name }}" == *-* ]]; then
            prerelease_flag="--prerelease"
          fi
          gh release create "${{ github.ref_name }}" \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --verify-tag \
            $prerelease_flag

  dependency-graph:
    name: Update Dependency Graph
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Setup Java ${{ env.JDK_CURRENT }}
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JDK_CURRENT }}
          check-latest: true

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Submit Dependency Graph
        uses: scalacenter/sbt-dependency-submission@v3
